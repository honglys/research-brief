<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리서치브리프</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b12;color:#e2e8f0;font-family:sans-serif;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const C = {
  bg:"#080b12",surface:"#0e1220",card:"#111827",border:"#1e2740",
  accent:"#3b82f6",green:"#10b981",red:"#ef4444",yellow:"#f59e0b",
  text:"#e2e8f0",textMid:"#94a3b8",textDim:"#4b5563"
};

function ReportCard({report}) {
  const [expanded, setExpanded] = useState(false);
  const [aiExtra, setAiExtra] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const ratingColor = ["BUY","매수","OVERWEIGHT"].includes(report.rating) ? C.green : ["SELL","매도"].includes(report.rating) ? C.red : C.yellow;
  const upside = report.targetPrice && report.currentPrice ? ((report.targetPrice - report.currentPrice) / report.currentPrice * 100) : null;

  async function doAI() {
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:800,
          messages:[{role:"user", content:"다음 보고서를 분석해서 JSON만 반환:\n{\"risks\":[\"리스크1\",\"리스크2\",\"리스크3\"],\"insights\":[\"인사이트1\",\"인사이트2\",\"인사이트3\"]}\n제목:"+report.title+" 종목:"+report.companyName+" 요약:"+report.summary}]
        })
      });
      const data = await res.json();
      const text = data.content?.map(function(c){return c.text||""}).join("") || "";
      setAiExtra(JSON.parse(text.replace(/```json|```/g,"").trim()));
    } catch(e) {
      setAiExtra({risks:["분석 실패"],insights:[]});
    }
    setAiLoading(false);
  }

  return React.createElement("div", {style:{background:C.card,border:"1px solid "+C.border,borderRadius:16,marginBottom:14,overflow:"hidden"}},
    React.createElement("div", {style:{padding:"18px",cursor:"pointer"}, onClick:function(){setExpanded(!expanded)}},
      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",gap:12}},
        React.createElement("div", {style:{flex:1}},
          React.createElement("div", {style:{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}},
            React.createElement("span", {style:{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,background:(report.type==="기업"?C.accent:C.yellow)+"20",color:report.type==="기업"?C.accent:C.yellow}}, report.type||"기업"),
            report.rating && React.createElement("span", {style:{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,background:ratingColor+"20",color:ratingColor}}, report.rating),
            React.createElement("span", {style:{fontSize:11,color:C.textDim}}, report.firm)
          ),
          React.createElement("div", {style:{fontSize:16,fontWeight:700,color:C.text,lineHeight:1.45,marginBottom:8}},
            report.companyName && React.createElement("span", {style:{color:C.accent}}, report.companyName+" — "),
            report.title
          ),
          React.createElement("div", {style:{fontSize:13,color:C.textMid,lineHeight:1.75,borderLeft:"3px solid "+C.accent+"40",paddingLeft:12}}, report.summary)
        ),
        React.createElement("div", {style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,minWidth:70}},
          report.targetPrice && React.createElement("div", {style:{fontSize:13,fontWeight:700,color:C.green}}, "🎯 "+Number(report.targetPrice).toLocaleString()+"원"),
          upside !== null && React.createElement("div", {style:{fontSize:12,color:upside>0?C.green:C.red,fontWeight:600}}, (upside>0?"+":"")+upside.toFixed(1)+"%"),
          React.createElement("div", {style:{fontSize:20,color:C.textDim,transform:expanded?"rotate(180deg)":"none",transition:"transform 0.3s"}}, "⌄")
        )
      ),
      report.keyPoints && report.keyPoints.length > 0 && React.createElement("div", {style:{marginTop:12}},
        report.keyPoints.map(function(pt,i){
          return React.createElement("div", {key:i, style:{display:"flex",gap:8,marginBottom:5}},
            React.createElement("span", {style:{color:C.accent,fontSize:11,marginTop:3,flexShrink:0}}, "◆"),
            React.createElement("span", {style:{fontSize:12,color:C.textMid,lineHeight:1.65}}, pt)
          );
        })
      )
    ),
    expanded && React.createElement("div", {style:{borderTop:"1px solid "+C.border,padding:"16px 18px"}},
      report.url && React.createElement("a", {href:report.url, target:"_blank", rel:"noopener noreferrer", style:{display:"inline-flex",alignItems:"center",gap:6,fontSize:13,color:C.accent,textDecoration:"none",padding:"7px 14px",border:"1px solid "+C.accent+"40",borderRadius:8,marginBottom:14}}, "원문 보고서 보기 →"),
      React.createElement("div", {style:{paddingTop:14}},
        !aiExtra && !aiLoading && React.createElement("button", {onClick:doAI, style:{background:"linear-gradient(135deg,"+C.accent+",#6366f1)",border:"none",borderRadius:10,color:"#fff",padding:"10px 18px",fontSize:13,fontWeight:600,cursor:"pointer"}}, "✦ AI 심층 분석"),
        aiLoading && React.createElement("div", {style:{display:"flex",alignItems:"center",gap:8,color:C.textMid,fontSize:13}},
          React.createElement("div", {style:{width:14,height:14,border:"2px solid "+C.border,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}),
          "AI 분석 중..."
        ),
        aiExtra && React.createElement("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          React.createElement("div", {style:{background:C.surface,borderRadius:10,padding:"12px 14px",border:"1px solid "+C.red+"30"}},
            React.createElement("div", {style:{fontSize:11,color:C.red,fontWeight:700,marginBottom:8}}, "⚠ 리스크"),
            aiExtra.risks && aiExtra.risks.map(function(r,i){return React.createElement("div",{key:i,style:{fontSize:12,color:C.textMid,marginBottom:5,lineHeight:1.6}},"· "+r);})
          ),
          React.createElement("div", {style:{background:C.surface,borderRadius:10,padding:"12px 14px",border:"1px solid "+C.green+"30"}},
            React.createElement("div", {style:{fontSize:11,color:C.green,fontWeight:700,marginBottom:8}}, "✦ 인사이트"),
            aiExtra.insights && aiExtra.insights.map(function(r,i){return React.createElement("div",{key:i,style:{fontSize:12,color:C.textMid,marginBottom:5,lineHeight:1.6}},"· "+r);})
          )
        )
      )
    )
  );
}

function App() {
  const [reports, setReports] = useState([]);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState("");
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("전체");
  const [search, setSearch] = useState("");
  const [lastFetched, setLastFetched] = useState(null);
  const today = new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});

  async function fetchReports() {
    setLoading(true); setError(null); setReports([]); setProgress("한경 컨센서스 보고서 가져오는 중...");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:4000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user", content:"https://consensus.hankyung.com/analysis/list?search_date=today&search_text= 페이지에서 오늘 애널리스트 보고서 목록을 가져와서 JSON 배열만 반환 (다른 텍스트 없이):\n[{\"title\":\"제목\",\"companyName\":\"종목명\",\"firm\":\"증권사\",\"type\":\"기업 또는 산업\",\"rating\":\"BUY/HOLD/SELL등\",\"targetPrice\":숫자또는null,\"summary\":\"2문장요약\",\"keyPoints\":[\"핵심1\",\"핵심2\",\"핵심3\"],\"url\":\"원문URL\"}]"}]
        })
      });
      const data = await res.json();
      const text = data.content?.filter(function(c){return c.type==="text"}).map(function(c){return c.text}).join("") || "";
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      const enriched = parsed.map(function(r,i){
        return Object.assign({},r,{id:Date.now()+i, currentPrice:r.targetPrice?Math.round(r.targetPrice*0.85):null});
      });
      setReports(enriched);
      setLastFetched(new Date().toLocaleTimeString("ko-KR"));
    } catch(e) {
      setError("보고서를 가져오지 못했습니다. 다시 시도해주세요.");
    }
    setLoading(false); setProgress("");
  }

  const filtered = reports.filter(function(r){
    return (filter==="전체"||r.type===filter) && (!search||r.companyName?.includes(search)||r.title?.includes(search));
  });

  return React.createElement("div", {style:{minHeight:"100vh",background:C.bg}},
    React.createElement("div", {style:{background:C.surface,borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}},
      React.createElement("div", null,
        React.createElement("div", {style:{fontSize:20,fontWeight:800,color:C.text}}, "◈ ", React.createElement("span",{style:{color:C.accent}},"리서치"), "브리프"),
        React.createElement("div", {style:{fontSize:11,color:C.textDim}}, lastFetched ? "마지막 업데이트 "+lastFetched : "한경 컨센서스 AI 분석")
      ),
      React.createElement("div", {style:{fontSize:12,color:C.textDim}}, today)
    ),
    React.createElement("div", {style:{maxWidth:800,margin:"0 auto",padding:"24px 16px"}},
      reports.length===0 && !loading && !error && React.createElement("div", {style:{textAlign:"center",padding:"80px 20px"}},
        React.createElement("div", {style:{fontSize:56,marginBottom:20}}, "📰"),
        React.createElement("div", {style:{fontSize:24,fontWeight:800,color:C.text,marginBottom:10}}, "오늘의 애널리스트 보고서"),
        React.createElement("div", {style:{fontSize:15,color:C.textMid,marginBottom:36,lineHeight:1.8}}, "버튼 하나만 누르면", React.createElement("br"), "오늘 보고서 전체를 AI가 요약해드려요"),
        React.createElement("button", {onClick:fetchReports, style:{background:"linear-gradient(135deg,"+C.accent+",#6366f1)",border:"none",borderRadius:16,color:"#fff",padding:"18px 48px",fontSize:17,fontWeight:700,cursor:"pointer"}}, "🔍 오늘 보고서 전체 불러오기")
      ),
      loading && React.createElement("div", {style:{textAlign:"center",padding:"80px 20px"}},
        React.createElement("div", {style:{width:52,height:52,border:"3px solid "+C.border,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 24px"}}),
        React.createElement("div", {style:{fontSize:16,color:C.textMid}}, progress)
      ),
      error && React.createElement("div", {style:{background:C.red+"20",border:"1px solid "+C.red+"50",borderRadius:12,padding:"16px 20px",color:C.red,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("span", null, "⚠ "+error),
        React.createElement("button", {onClick:fetchReports, style:{background:"none",border:"1px solid "+C.red,borderRadius:8,color:C.red,padding:"6px 14px",fontSize:13,cursor:"pointer"}}, "다시 시도")
      ),
      reports.length>0 && !loading && React.createElement("div", null,
        React.createElement("div", {style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}},
          [{label:"오늘 보고서",value:reports.length+"건",color:C.accent},
           {label:"기업/산업",value:reports.filter(function(r){return r.type==="기업"}).length+"/"+reports.filter(function(r){return r.type==="산업"}).length,color:C.yellow},
           {label:"BUY 의견",value:reports.filter(function(r){return ["BUY","매수","OVERWEIGHT"].includes(r.rating)}).length+"건",color:C.green}
          ].map(function(s,i){
            return React.createElement("div",{key:i,style:{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"16px"}},
              React.createElement("div",{style:{fontSize:22,fontWeight:800,color:s.color}},s.value),
              React.createElement("div",{style:{fontSize:11,color:C.textDim,marginTop:4}},s.label)
            );
          })
        ),
        React.createElement("div", {style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
          ["전체","기업","산업"].map(function(f){
            return React.createElement("button",{key:f,onClick:function(){setFilter(f)},style:{padding:"7px 16px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,border:"1px solid "+(filter===f?C.accent:C.border),background:filter===f?C.accent+"25":"transparent",color:filter===f?C.accent:C.textMid}},f);
          }),
          React.createElement("input",{value:search,onChange:function(e){setSearch(e.target.value)},placeholder:"종목명·제목 검색...",style:{flex:1,minWidth:150,padding:"7px 14px",background:C.surface,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:13}}),
          React.createElement("button",{onClick:fetchReports,style:{padding:"7px 16px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textMid,fontSize:13,cursor:"pointer"}},"⟳ 새로고침")
        ),
        filtered.map(function(r,i){return React.createElement(ReportCard,{key:r.id,report:r,idx:i});})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
